name: A-share market brief

on:
  schedule:
    # 09:20-11:30 Asia/Shanghai, Monday-Friday.
    - cron: "20-55/5 1 * * 1-5"
    - cron: "0-55/5 2 * * 1-5"
    - cron: "0-30/5 3 * * 1-5"
    # 13:00-15:00 Asia/Shanghai, Monday-Friday.
    - cron: "0-55/5 5 * * 1-5"
    - cron: "0-55/5 6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and append Google Doc brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          EMAIL_TO: 11283176@qq.com
          EMAIL_FROM: zhangdaojun@gmail.com
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "465"
          SMTP_USERNAME: zhangdaojun@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/premarket_report.py
